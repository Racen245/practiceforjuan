<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Builder Workspace</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background-image: 
            linear-gradient(to right, #e0e0e0 1px, transparent 1px),
            linear-gradient(to bottom, #e0e0e0 1px, transparent 1px);
            background-size: 20px 20px; background-color: white; }
        .ui-layer { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; pointer-events: none; }
        .btn { background: #d40000; color: white; border: none; padding: 8px 15px; border-radius: 5px; 
               font-size: 12px; cursor: pointer; pointer-events: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-weight: bold; }
        .info { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: #666; pointer-events: none; }
    </style>
</head>
<body>

<div class="ui-layer">
    <button class="btn" onclick="resetPieces()">Reset Bricks</button>
</div>

<div class="info">Drag to move • Double-tap/click to rotate (90°)</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

const s = Math.min(canvas.width, canvas.height) / 14; 

let shapes = [];
let draggingShape = null;
let offsetX, offsetY;
let lastTap = 0;

class Brick {
    constructor(w, h, color, x, y, hasEye = false) {
        this.w = w * s;
        this.h = h * s;
        this.color = color;
        this.startX = x;
        this.startY = y;
        this.x = x;
        this.y = y;
        this.rotation = 0;
        this.hasEye = hasEye;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        
        ctx.fillStyle = this.color;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);

        if (this.hasEye) {
            const eyeSize = Math.min(this.w, this.h) * 0.35;
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(0, 0, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(eyeSize * 0.3, 0, eyeSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    isPointInside(px, py) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.beginPath();
        ctx.rect(-this.w/2, -this.h/2, this.w, this.h);
        const result = ctx.isPointInPath(px, py);
        ctx.restore();
        return result;
    }
}

function initShapes() {
    const W = canvas.width;
    const H = canvas.height;
    
    shapes = [
        // LEFT MARGIN: Red Plate and TWO Yellow 2x2 Bricks
        new Brick(0.5, 2, '#d40000', s*2, H*0.25), 
        new Brick(1, 1, '#ffed00', s*2, H*0.55),    
        new Brick(1, 1, '#ffed00', s*2, H*0.85),    

        // TOP MARGIN: Yellow 2x4
        new Brick(1, 2, '#ffed00', W*0.5, s*2),    

        // RIGHT MARGIN: Red Plate and ONE Eye Brick
        new Brick(0.5, 2, '#d40000', W-s*2, H*0.3),
        new Brick(1, 1, '#ffed00', W-s*2, H*0.7, true) 
    ];
}

function resetPieces() {
    shapes.forEach(shape => {
        shape.x = shape.startX;
        shape.y = shape.startY;
        shape.rotation = 0;
    });
    drawAll();
}

function handleStart(e) {
    const touch = e.touches ? e.touches[0] : e;
    const now = Date.now();
    
    for (let i = shapes.length - 1; i >= 0; i--) {
        if (shapes[i].isPointInside(touch.clientX, touch.clientY)) {
            // Double-click to rotate
            if (now - lastTap < 300) {
                shapes[i].rotation += 90;
                draggingShape = null;
            } else {
                draggingShape = shapes[i];
                offsetX = touch.clientX - draggingShape.x;
                offsetY = touch.clientY - draggingShape.y;
                shapes.push(shapes.splice(i, 1)[0]);
            }
            lastTap = now;
            drawAll();
            break;
        }
    }
}

function handleMove(e) {
    if (draggingShape) {
        const touch = e.touches ? e.touches[0] : e;
        draggingShape.x = touch.clientX - offsetX;
        draggingShape.y = touch.clientY - offsetY;
        drawAll();
    }
}

function drawAll() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    shapes.forEach(s => s.draw());
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e); }, {passive: false});
window.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive: false});
window.addEventListener('touchend', () => draggingShape = null);
canvas.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', () => draggingShape = null);
window.addEventListener('resize', () => { resize(); drawAll(); });

initShapes();
drawAll();
</script>
</body>
</html>
