<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Builder Workspace</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background-image: 
            linear-gradient(to right, #e0e0e0 1px, transparent 1px),
            linear-gradient(to bottom, #e0e0e0 1px, transparent 1px);
            background-size: 40px 40px; background-color: white; }
        
        .ui-layer { 
            position: absolute; 
            top: 10px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            pointer-events: none; 
            gap: 15px;
        }

        .info { 
            font-size: 18px; 
            color: #0056b3; 
            font-weight: bold; 
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .btn { 
            background: #d40000; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-size: 14px; 
            cursor: pointer; 
            pointer-events: auto; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div class="ui-layer">
    <div class="info">Drag to move • Double-tap/click to rotate (90°)</div>
    <button class="btn" onclick="resetPieces()">Reset Bricks</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

const s = Math.min(canvas.width, canvas.height) / 7; 

let shapes = [];
let draggingShape = null;
let offsetX, offsetY;
let lastTap = 0;

class Brick {
    constructor(w, h, color, x, y, hasEye = false) {
        this.w = w * s;
        this.h = h * s;
        this.color = color;
        this.startX = x;
        this.startY = y;
        this.x = x;
        this.y = y;
        this.rotation = 0;
        this.hasEye = hasEye;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        
        ctx.fillStyle = this.color;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);

        if (this.hasEye) {
            const eyeSize = Math.min(this.w, this.h) * 0.35;
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(0, 0, eyeSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.arc(eyeSize * 0.3, 0, eyeSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    isPointInside(px, py) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.beginPath();
        ctx.rect(-this.w/2, -this.h/2, this.w, this.h);
        const result = ctx.isPointInPath(px, py);
        ctx.restore();
        return result;
    }
}

function initShapes() {
    const W = canvas.width;
    const H = canvas.height;
    
    shapes = [
        // Left column
        new Brick(0.5, 2, '#d40000', s*1.5, H*0.25), 
        new Brick(1, 1, '#ffed00', s*1.5, H*0.55),    
        new Brick(1, 1, '#ffed00', s*1.5, H*0.85),    

        // Center: Moved further down to be under the Reset button (s*3.5 instead of s*1.5)
        new Brick(1, 2, '#ffed00', W*0.5, s*3.5),    

        // Right column
        new Brick(0.5, 2, '#d40000', W-s*1.5, H*0.3),
        new Brick(1, 1, '#ffed00', W-s*1.5, H*0.7, true) 
    ];
}

function resetPieces() {
    shapes.forEach(shape => {
        shape.x = shape.startX;
        shape.y = shape.startY;
        shape.rotation = 0;
    });
    drawAll();
}

function handleStart(e) {
    const touch = e.touches ? e.touches[0] : e;
    const now = Date.now();
    
    for (let i = shapes.length - 1; i >= 0; i--) {
        if (shapes[i].isPointInside(touch.clientX, touch.clientY)) {
            if (now - lastTap < 300) {
                shapes[i].rotation += 90;
                draggingShape = null;
            } else {
                draggingShape = shapes[i];
                offsetX = touch.clientX - draggingShape.x;
                offsetY = touch.clientY - draggingShape.y;
                shapes.push(shapes.splice(i, 1)[0]);
            }
            lastTap = now;
            drawAll();
            break;
        }
    }
}

function handleMove(e) {
    if (draggingShape) {
        const touch = e.touches ? e.touches[0] : e;
        draggingShape.x = touch.clientX - offsetX;
        draggingShape.y = touch.clientY - offsetY;
        drawAll();
    }
}

function drawAll() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    shapes.forEach(s => s.draw());
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e); }, {passive: false});
window.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive: false});
window.addEventListener('touchend', () => draggingShape = null);
canvas.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', () => draggingShape = null);
window.addEventListener('resize', () => { resize(); drawAll(); });

initShapes();
drawAll();
</script>
</body>
</html>
